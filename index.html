<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>नागरिक आवाज - Nepal Citizen Problems</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', 'Noto Sans', Arial, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
        }
        
        /* Beautiful Floating Background */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        
        .shape {
            position: absolute;
            border-radius: 50%;
            animation: floatRandom 10s ease-in-out infinite;
            opacity: 0.6;
        }
        
        .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            top: 10%;
            left: 5%;
            animation-duration: 8s;
        }
        
        .shape:nth-child(2) {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            top: 20%;
            right: 10%;
            animation-duration: 12s;
            animation-delay: 2s;
        }
        
        .shape:nth-child(3) {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #55efc4, #00b894);
            bottom: 30%;
            left: 15%;
            animation-duration: 10s;
            animation-delay: 4s;
        }
        
        .shape:nth-child(4) {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #fdcb6e, #f39c12);
            bottom: 20%;
            right: 20%;
            animation-duration: 14s;
            animation-delay: 1s;
        }
        
        .shape:nth-child(5) {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
            top: 50%;
            left: 50%;
            animation-duration: 11s;
            animation-delay: 3s;
        }
        
        .shape:nth-child(6) {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #fd79a8, #e84393);
            top: 70%;
            left: 5%;
            animation-duration: 9s;
            animation-delay: 5s;
        }
        
        @keyframes floatRandom {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            25% { transform: translateY(-30px) rotate(90deg) scale(1.1); }
            50% { transform: translateY(0) rotate(180deg) scale(1); }
            75% { transform: translateY(30px) rotate(270deg) scale(0.9); }
        }
        
        /* Rainbow Header */
        header {
            background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #a29bfe, #55efc4);
            background-size: 400% 400%;
            animation: rainbowBg 10s ease infinite;
            color: white;
            padding: 90px 20px;
            text-align: center;
            position: relative;
        }
        
        @keyframes rainbowBg {
            0% { background-position: 0% 50%; }
            25% { background-position: 25% 50%; }
            50% { background-position: 50% 50%; }
            75% { background-position: 75% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        header::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            clip-path: ellipse(50% 100% at 50% 100%);
        }
        
        header h1 {
            font-size: 62px;
            font-weight: 900;
            margin-bottom: 15px;
            text-shadow: 4px 4px 8px rgba(0,0,0,0.2);
            animation: waveTitle 2s ease-in-out infinite;
        }
        
        @keyframes waveTitle {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        header h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
        }
        
        header p {
            font-size: 26px;
            font-weight: 600;
        }
        
        .flag-icon {
            font-size: 55px;
            margin: 0 15px;
            animation: waveFlag 1.5s ease-in-out infinite;
        }
        
        @keyframes waveFlag {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }
        
        /* Colorful Navigation */
        nav {
            background: linear-gradient(90deg, #2d3436 0%, #636e72 50%, #2d3436 100%);
            background-size: 200% 200%;
            animation: navShine 5s ease infinite;
            padding: 22px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        @keyframes navShine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        nav a {
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            margin: 8px;
            display: inline-block;
            border-radius: 50px;
            font-weight: 700;
            font-size: 17px;
            transition: all 0.4s ease;
            position: relative;
        }
        
        nav a:hover {
            transform: translateY(-5px) rotate(3deg) scale(1.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        
        nav a:nth-child(1):hover { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        nav a:nth-child(2):hover { background: linear-gradient(135deg, #feca57, #f39c12); }
        nav a:nth-child(3):hover { background: linear-gradient(135deg, #48dbfb, #0abde3); }
        nav a:nth-child(4):hover { background: linear-gradient(135deg, #a29bfe, #6c5ce7); }
        nav a:nth-child(5):hover { background: linear-gradient(135deg, #55efc4, #00b894); }
        
        /* Main Container */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        
        /* Beautiful Cards */
        .card {
            background: rgba(255, 255, 255, 0.98);
            padding: 45px;
            margin: 35px 0;
            border-radius: 30px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.12);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #a29bfe, #55efc4);
            background-size: 500% 100%;
            animation: colorLine 5s ease infinite;
        }
        
        @keyframes colorLine {
            0% { background-position: 0% 50%; }
            100% { background-position: 500% 50%; }
        }
        
        .card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 35px 100px rgba(0,0,0,0.15);
        }
        
        .card h2 {
            font-size: 38px;
            font-weight: 900;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #ff6b6b, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .card p {
            color: #2d3436;
            font-size: 22px;
            line-height: 1.9;
        }
        
        .card ul {
            margin: 25px 0;
            padding-left: 35px;
        }
        
        .card li {
            color: #2d3436;
            font-size: 21px;
            margin: 18px 0;
            position: relative;
        }
        
        .card li::before {
            content: '★';
            position: absolute;
            left: -35px;
            color: #feca57;
            font-size: 20px;
        }
        
        /* Colorful Buttons */
        .btn {
            color: white;
            padding: 22px 50px;
            text-decoration: none;
            font-size: 24px;
            font-weight: 700;
            border-radius: 70px;
            display: inline-block;
            margin: 18px 12px;
            transition: all 0.4s ease;
            box-shadow: 0 12px 35px rgba(0,0,0,0.2);
        }
        
        .btn:hover {
            transform: translateY(-8px) scale(1.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        }
        
        .btn-red { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        .btn-orange { background: linear-gradient(135deg, #feca57, #f39c12); color: #333 !important; }
        .btn-blue { background: linear-gradient(135deg, #48dbfb, #0abde3); color: #333 !important; }
        .btn-purple { background: linear-gradient(135deg, #a29bfe, #6c5ce7); }
        .btn-green { background: linear-gradient(135deg, #55efc4, #00b894); }
        .btn-pink { background: linear-gradient(135deg, #fd79a8, #e84393); }
        
        /* Rainbow Button */
        .btn-rainbow {
            background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #a29bfe, #55efc4);
            background-size: 400% 400%;
            animation: rainbowBtn 4s ease infinite;
        }
        
        @keyframes rainbowBtn {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Colorful Steps */
        .steps-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 35px;
            gap: 30px;
        }
        
        .step {
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            min-width: 300px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.12);
            transition: all 0.4s ease;
        }
        
        .step:hover {
            transform: translateY(-15px) scale(1.05);
        }
        
        .step:nth-child(1) { background: linear-gradient(135deg, #ffeaa70, #fab1a0); }
        .step:nth-child(2) { background: linear-gradient(135deg, #81ecec, #74b9ff); }
        .step:nth-child(3) { background: linear-gradient(135deg, #dfe6e9, #b2bec3); }
        
        .step-number {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 40px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .step:nth-child(1) .step-number { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        .step:nth-child(2) .step-number { background: linear-gradient(135deg, #feca57, #f39c12); }
        .step:nth-child(3) .step-number { background: linear-gradient(135deg, #48dbfb, #0abde3); }
        
        .step h4 {
            font-size: 26px;
            margin-bottom: 15px;
            color: #2d3436;
        }
        
        .step p {
            font-size: 20px;
            color: #636e72;
        }
        
        /* Rainbow Contact Box */
        .contact-box {
            background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #a29bfe, #55efc4);
            background-size: 400% 400%;
            animation: rainbowBtn 5s ease infinite;
            color: white;
            padding: 55px;
            border-radius: 35px;
            text-align: center;
            margin: 40px 0;
            box-shadow: 0 25px 70px rgba(0,0,0,0.15);
        }
        
        .contact-box h3 {
            font-size: 42px;
            margin-bottom: 30px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.15);
        }
        
        .contact-box p {
            color: white;
            font-size: 24px;
            margin: 18px 0;
        }
        
        .contact-box a {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            text-decoration: underline;
            padding: 10px 25px;
            display: inline-block;
            border-radius: 50px;
            transition: all 0.3s ease;
        }
        
        .contact-box a:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }
        
        /* Beautiful Footer */
        footer {
            background: linear-gradient(135deg, #2d3436, #636e72);
            color: white;
            padding: 50px 20px;
            text-align: center;
            margin-top: 60px;
            position: relative;
        }
        
        footer::before {
            content: '';
            position: absolute;
            top: -30px;
            left: 0;
            width: 100%;
            height: 30px;
            background: linear-gradient(135deg, #2d3436, #636e72);
            clip-path: ellipse(50% 100% at 50% 100%);
        }
        
        footer p {
            font-size: 20px;
            margin: 12px 0;
        }
        
        footer .love {
            color: #ff6b6b;
            font-size: 28px;
        }
        
        footer .flag {
            font-size: 35px;
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            header h1 { font-size: 38px; }
            header h2 { font-size: 24px; }
            header p { font-size: 18px; }
            .card { padding: 30px; }
            .card h2 { font-size: 28px; }
            .card p { font-size: 18px; }
            .btn { padding: 18px 35px; font-size: 20px; }
